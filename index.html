<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Web3 作業 - 10173183</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        button { background-color: #f0ad4e; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        #result { margin-top: 20px; font-size: 18px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Web3 智能合約互動</h1>
        <p>學號：10173183</p>
        <button onclick="loadMessage()">讀取合約訊息</button>
        <div id="result">狀態：等待連線...</div>
    </div>

    <script>
        async function loadMessage() {
            const resultDiv = document.getElementById('result');
            const contractAddress = "0x64571A1A8116C97664B99903730248408f667345";
            
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const web3 = new Web3(window.ethereum);
                    resultDiv.innerText = "正在讀取區塊鏈原始資料...";

                    // 使用底層 call 直接抓取 message() 函式的回傳值
                    const rawData = await web3.eth.call({
                        to: contractAddress,
                        data: "0xe2113709" // message() 的函式選擇器
                    });

                    // 將原始資料轉為字串並過濾掉雜訊
                    const cleanMsg = web3.eth.abi.decodeParameter('string', rawData);
                    resultDiv.innerText = "成功讀取！合約訊息為：" + cleanMsg;
                } catch (error) {
                    console.error(error);
                    resultDiv.innerText = "讀取失敗，請確認已切換至 Sepolia 網路";
                }
            } else {
                alert("請安裝 MetaMask！");
            }
        }
    </script>
</body>
</html>

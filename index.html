<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Web3 作業 - 10173183</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        button { background-color: #f0ad4e; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
        #result { margin-top: 20px; font-size: 18px; color: #2c3e50; font-weight: bold; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Web3 智能合約互動</h1>
        <p>學號：10173183</p>
        <button onclick="readMessage()">讀取合約訊息</button>
        <div id="result">狀態：等待讀取</div>
    </div>

    <script>
        async function readMessage() {
            const res = document.getElementById('result');
            // 這是從你的截圖中確認的正確地址
            const addr = "0x6455B907530D8c94664A3aD23C27653606567345";
            
            if (window.ethereum) {
                try {
                    const web3 = new Web3(window.ethereum);
                    res.innerText = "正在連線 Sepolia 讀取資料...";

                    // 直接呼叫合約中的 message() 函式 (Selector: 0xe2113709)
                    const data = await web3.eth.call({
                        to: addr,
                        data: "0xe2113709" 
                    });

                    // 檢查是否讀取到有效資料
                    if (data === "0x") {
                        res.innerText = "錯誤：找不到合約，請確認 MetaMask 是否在 Sepolia 網路";
                        return;
                    }

                    // 解碼字串
                    const msg = web3.eth.abi.decodeParameter('string', data);
                    res.innerText = "✅ 讀取成功！\n合約訊息：" + msg;

                } catch (e) {
                    res.innerText = "❌ 失敗：" + e.message;
                }
            } else {
                alert("請安裝 MetaMask");
            }
        }
    </script>
</body>
</html>
